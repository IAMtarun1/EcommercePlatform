spring.application.name=EcommercePlatform

# Use H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Properties
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Stripe Configuration (mock values for testing)
stripe.api.secret-key=sk_test_mock_key_12345
stripe.api.public-key=pk_test_mock_key_12345

# Logging
logging.level.com.ecommerce.ecommerceplatform=WARN
